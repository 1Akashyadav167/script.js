<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul class="language">
        <li>Javascript</li>
    </ul>


    
</body>
<script>
    function addLang(languages){
       const li=  document.createElement('li');
       li.innerHTML=`${languages}`
       document.querySelector('.language').appendChild(li)
    
       
    }
    addLang('python');

    function addLang(languagess){
       const li= document.createElement('li')
       li.appendChild(document.createTextNode(languagess));
       document.querySelector('.language').appendChild(li)
    }
    addLang("Typesscript");

    // edit
    const secondLang= document.querySelector('li:nth-child(2)')
    secondLang.textContent="java"
</script>
</html>
